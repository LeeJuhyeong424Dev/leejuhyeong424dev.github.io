name: IndexNow 추가

on:
  repository_dispatch:
    types:
      - indexnow-add  # "indexnow-add" 이벤트 타입 감지

jobs:
  indexnow_add_job:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: 30초 대기
        run: |
          echo "IndexNow 워크플로우 시작 후 30초 대기합니다..."
          sleep 30

      - name: 추가된 파일 출력
        run: |
          echo "IndexNow 추가 워크플로우가 실행되었습니다."

          # 전달된 client_payload 전체를 출력해봅니다.
          echo "전달된 client_payload 데이터: ${{ toJson(github.event.client_payload) }}"

          # 전달된 추가된 파일 목록을 쉼표로 분리된 배열로 가져옵니다.
          ADDED_FILES="${{ join(github.event.client_payload.added_files, ',') }}"
          echo "전달된 추가된 파일 목록: $ADDED_FILES"

          # 파일 목록을 쉼표를 기준으로 나누어 하나씩 출력
          IFS=',' read -ra FILES <<< "$ADDED_FILES"
          for FILE in "${FILES[@]}"; do
            echo "추가된 파일: $FILE"
          done

      - name: 파일명에서 제목 추출 및 개별 URL IndexNow API 호출 후 기록
        env:
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
        run: |
          set +e  # 오류 발생 시 스크립트가 중단되지 않도록 설정
          
          ADDED_FILES="${{ join(github.event.client_payload.added_files, ',') }}"
          echo "전달된 추가된 파일 목록: $ADDED_FILES"

          # 파일 목록을 쉼표를 기준으로 나누어 하나씩 처리하여 URL 구성
          IFS=',' read -ra FILES <<< "$ADDED_FILES"
          
          # 파일의 절대 경로 지정
          STATUS_FILE_PATH="./indexnow-status.md"
          
          # 파일이 존재하는지 확인
          if [ ! -f "$STATUS_FILE_PATH" ]; then
            echo "파일이 존재하지 않습니다: $STATUS_FILE_PATH"
            exit 1
          fi

          # 임시 파일 생성
          TEMP_FILE="updated_indexnow_status.md"
          touch $TEMP_FILE

          # 기존 indexnow-status.md 파일을 읽어 각 섹션별로 처리
          SECTION="none"
          while IFS= read -r line
          do
              if [[ "$line" == "## 인덱스 추가" ]]; then
                  SECTION="add"
                  echo "$line" >> $TEMP_FILE
                  echo "" >> $TEMP_FILE  # 빈 줄 추가

                  # 새로운 내용을 기존 섹션에 추가 (최신순으로 추가)
                  for FILE in "${FILES[@]}"; do
                      # 파일명에서 날짜와 확장자를 제외한 제목 부분만 추출
                      TITLE=$(echo "$FILE" | sed -E 's|_posts/[0-9]{4}-[0-9]{2}-[0-9]{2}-(.*)\.md|\1|')
                      echo "추출된 제목: $TITLE"

                      # URL 구성 (추출된 제목을 기반으로 페이지 URL 생성)
                      URL="https://leejuhyeong424dev.github.io/posts/${TITLE}"
                      
                      # IndexNow API 호출을 위한 JSON 데이터 구성
                      JSON_PAYLOAD="{\"host\": \"leejuhyeong424dev.github.io\", \"key\": \"$INDEXNOW_API_KEY\", \"keyLocation\": \"https://leejuhyeong424dev.github.io/myIndexNowKey.txt\", \"urlList\": [\"${URL}\"]}"
                      
                      echo "IndexNow API 호출 중... JSON Payload: $JSON_PAYLOAD"

                      # IndexNow API 호출 및 응답 저장
                      RESPONSE=$(curl -s -X POST "https://api.indexnow.org/indexnow" \
                        -H "Content-Type: application/json" \
                        -d "$JSON_PAYLOAD" -w "\n%{http_code}" || true)

                      # 응답 본문과 상태 코드 분리
                      HTTP_BODY=$(echo "$RESPONSE" | sed '$d')
                      HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)

                      # 응답 출력 및 상태 코드 확인
                      echo "IndexNow API 응답 본문 (URL: $URL):"
                      echo "$HTTP_BODY"
                      echo "IndexNow API 상태 코드 (URL: $HTTP_STATUS)"

                      # 현재 날짜 가져오기 (예: 2024-10-26 형식)
                      CURRENT_DATE=$(date +%Y-%m-%d)

                      # 응답 코드에 따른 한글 설명 매핑
                      case "$HTTP_STATUS" in
                        200) STATUS_TEXT="성공" ;;
                        202) STATUS_TEXT="검증 중" ;;
                        400) STATUS_TEXT="잘못된 요청" ;;
                        403) STATUS_TEXT="키 오류" ;;
                        422) STATUS_TEXT="호스트 불일치" ;;
                        429) STATUS_TEXT="요청 초과" ;;
                        *) STATUS_TEXT="알 수 없는 오류" ;;
                      esac

                      # 상세 설명 매핑
                      case "$HTTP_STATUS" in
                        200) STATUS_DETAIL="URL 제출 성공 (반환 코드: $HTTP_STATUS)" ;;
                        202) STATUS_DETAIL="URL 수신됨. IndexNow 키 검증 보류 중 (반환 코드: $HTTP_STATUS)" ;;
                        400) STATUS_DETAIL="잘못된 요청 형식 (반환 코드: $HTTP_STATUS)" ;;
                        403) STATUS_DETAIL="유효하지 않은 키 (반환 코드: $HTTP_STATUS)" ;;
                        422) STATUS_DETAIL="호스트 불일치 또는 키 불일치 (반환 코드: $HTTP_STATUS)" ;;
                        429) STATUS_DETAIL="너무 많은 요청 (반환 코드: $HTTP_STATUS)" ;;
                        *) STATUS_DETAIL="알 수 없는 오류 (반환 코드: $HTTP_STATUS)" ;;
                      esac

                      # 새로운 기록을 추가 (툴팁과 함께 표 형식으로)
                      echo "| $CURRENT_DATE | <span title=\"$STATUS_DETAIL\">$STATUS_TEXT</span> | [$URL]($URL) |" >> $TEMP_FILE
                  done
                  echo "" >> $TEMP_FILE  # 섹션 끝에 빈 줄 추가
                  continue
              elif [[ "$line" == "## 인덱스 수정" ]]; then
                  SECTION="modify"
              elif [[ "$line" == "## 인덱스 삭제" ]]; then
                  SECTION="delete"
              fi

              # 기존 "## 인덱스 추가" 섹션은 새로운 내용으로 대체되었으므로 건너뜀
              if [[ "$SECTION" != "add" ]]; then
                  echo "$line" >> $TEMP_FILE
              fi
          done < "$STATUS_FILE_PATH"

          # 기존 파일을 업데이트된 파일로 교체
          mv $TEMP_FILE $STATUS_FILE_PATH

      - name: 변경 사항 커밋 및 푸시
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add indexnow-status.md
          git commit -m "Update indexnow-status.md with latest IndexNow processing results"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
